<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junhui He · 3D Vision Researcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(145deg,#eef2f9,#e0e7f0);
    padding:2rem 1rem;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:2rem;
    overflow:hidden;
    position:relative;
}

/* 语言按钮 */
.lang-switch{
    position:absolute;
    top:20px;
    right:20px;
}
.lang-btn{
    padding:6px 12px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
.lang-btn.active{
    background:#1e3c4c;
    color:white;
}

/* 标题 */
.section-title{
    display:flex;
    align-items:center;
    gap:0.6rem;
    margin-bottom:1rem;
}
.section-title span:last-child{
    flex:1;
    min-width:0;
    white-space:nowrap;
}

/* 教育 */
.edu-card{
    display:flex;
    gap:1rem;
    margin-bottom:1rem;
}
.edu-details{
    flex:1;
    min-width:0;
}
.edu-details h3,
.edu-details p{
    word-break:keep-all;
}

/* 全局防竖排 */
h1,h2,h3,p,span{
    word-break:keep-all;
}

/* 小屏优化 */
@media(max-width:500px){
    .section-title span:last-child{
        white-space:normal;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="lang-switch">
<button class="lang-btn active" data-lang="zh">中文</button>
<button class="lang-btn" data-lang="en">English</button>
</div>

<div class="content">

<section>
<div class="section-title">
<span></span>
<span id="eduTitle">📖 教育经历</span>
</div>

<div class="edu-card">
<div>2024 – 至今</div>
<div class="edu-details">
<h3 id="edu1Title">摄影测量与遥感 硕士</h3>
<p id="edu1Inst">中国地质大学（武汉）</p>
</div>
</div>

<div class="edu-card">
<div>2020 – 2024</div>
<div class="edu-details">
<h3 id="edu2Title">遥感科学与技术 学士</h3>
<p id="edu2Inst">中国地质大学（武汉）</p>
</div>
</div>

</section>

<section>
<div class="section-title">
<span></span>
<span id="researchTitle">🔬 研究方向</span>
</div>
<p id="interest1">三维重建</p>
<p id="interest2">新视角合成</p>
<p id="interest3">3D高斯泼溅</p>
</section>

<section>
<div class="section-title">
<span></span>
<span id="pubTitle">📄 论文发表</span>
</div>

<p id="pubName">MPD-GS: Mask-guided point densification for Gaussian splatting</p>
<p id="pubAuthors">Junhui He ...</p>
<p id="pubJournal">Neurocomputing 2025</p>
<a id="codeLink" href="#">💻 代码仓库</a>

</section>

<section>
<div class="section-title">
<span></span>
<span id="techTitle">💻 技术栈</span>
</div>
<p id="skill1">Python</p>
<p id="skill2">C++</p>
</section>

</div>
</div>

<script>
const translations={
zh:{
eduTitle:"📖 教育经历",
edu1Title:"摄影测量与遥感 硕士",
edu1Inst:"中国地质大学（武汉）",
edu2Title:"遥感科学与技术 学士",
edu2Inst:"中国地质大学（武汉）",
researchTitle:"🔬 研究方向",
interest1:"三维重建",
interest2:"新视角合成",
interest3:"3D高斯泼溅",
pubTitle:"📄 论文发表",
pubName:"MPD-GS: 基于掩膜引导的高斯泼溅",
pubAuthors:"Junhui He 等",
pubJournal:"Neurocomputing 2025",
codeLink:"💻 代码仓库",
techTitle:"💻 技术栈",
skill1:"Python",
skill2:"C++"
},
en:{
eduTitle:"📖 Education",
edu1Title:"MSc",
edu1Inst:"CUG",
edu2Title:"BSc",
edu2Inst:"CUG",
researchTitle:"🔬 Research",
interest1:"3D Reconstruction",
interest2:"NVS",
interest3:"3DGS",
pubTitle:"📄 Publications",
pubName:"MPD-GS",
pubAuthors:"Junhui He et al.",
pubJournal:"Neurocomputing 2025",
codeLink:"💻 Code",
techTitle:"💻 Tech Stack",
skill1:"Python",
skill2:"C++"
}
};

function switchLanguage(lang){
const t=translations[lang];
for(const key in t){
const el=document.getElementById(key);
if(el) el.innerText=t[key];
}
document.querySelectorAll('.lang-btn').forEach(b=>{
b.classList.toggle('active',b.dataset.lang===lang);
});
}

document.querySelectorAll('.lang-btn').forEach(btn=>{
btn.onclick=()=>switchLanguage(btn.dataset.lang);
});
</script>

</body>
</html>
